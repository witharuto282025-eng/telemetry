<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>テレメトリー v2</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  :root{
    --bg:#0d0d0d;--panel:#1a1a1a;--border:#2a2a2a;--accent:#00e676;
    --accent2:#00bcd4;--warn:#ff5722;--text:#e0e0e0;--dim:#777;
  }
  body{font-family:'Segoe UI','Hiragino Sans',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column;}

  /* ===== ANIMATIONS ===== */
  @keyframes pulseRed {
    0%,100%{box-shadow:0 0 8px #f44336aa;opacity:1;}
    50%{box-shadow:0 0 24px #f44336ff;opacity:0.85;}
  }
  @keyframes pulseDot {
    0%,100%{box-shadow:0 0 4px #f44336aa;transform:scale(1);}
    50%{box-shadow:0 0 14px #f44336ff;transform:scale(1.3);}
  }
  @keyframes flashError {
    0%,100%{background:#3a0a0a;border-color:#f44336;}
    50%{background:#5a1010;border-color:#ff6659;}
  }

  /* ===== HEADER ===== */
  header{display:flex;align-items:center;justify-content:space-between;padding:8px 20px;background:#111;border-bottom:1px solid var(--border);flex-shrink:0;}
  header h1{font-size:18px;font-weight:700;letter-spacing:2px;}
  header h1 span{color:var(--accent);font-weight:400;font-size:13px;margin-left:8px;}

  /* --- Connection Status (top-right) --- */
  #connStatus{
    font-size:14px;display:flex;align-items:center;gap:10px;
    padding:6px 18px;border-radius:20px;
    background:#1e0a0a;border:2px solid #f44336;
    transition:all .4s;
  }
  #connStatus.connected{
    background:#0a1e0f;border-color:var(--accent);
  }
  #connDot{
    width:14px;height:14px;border-radius:50%;background:#f44336;
    flex-shrink:0;
    animation:pulseDot 1.2s ease-in-out infinite;
    transition:background .3s;
  }
  #connDot.ok{background:var(--accent);animation:none;box-shadow:0 0 8px var(--accent);}
  #connText{font-weight:600;color:#f44336;transition:color .3s;}
  #connStatus.connected #connText{color:var(--accent);}

  /* ===== MAIN LAYOUT ===== */
  .main{display:grid;grid-template-columns:260px 1fr 340px;grid-template-rows:1fr;flex:1;overflow:hidden;gap:0;}

  /* ===== LEFT SIDEBAR ===== */
  .sidebar-left{background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;padding:12px;}
  .panel-title{font-size:12px;text-transform:uppercase;color:var(--accent);letter-spacing:1px;margin-bottom:8px;border-bottom:1px solid var(--border);padding-bottom:4px;}
  .info-table{width:100%;font-size:12px;margin-bottom:16px;}
  .info-table td{padding:3px 6px;}
  .info-table td:first-child{color:var(--dim);white-space:nowrap;}
  .info-table td:last-child{text-align:right;font-family:'Courier New',monospace;}

  .data-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
  .data-card{background:#222;border:1px solid var(--border);border-radius:6px;padding:8px;text-align:center;transition:all .3s;}
  .data-card .label{font-size:10px;color:var(--dim);text-transform:uppercase;}
  .data-card .value{font-size:20px;font-weight:700;font-family:'Courier New',monospace;color:var(--accent2);margin-top:2px;}
  .data-card .unit{font-size:10px;color:var(--dim);}
  .data-card.full{grid-column:span 2;}

  /* --- Error cards (highlighted) --- */
  .data-card.error-card{
    border:2px solid #f4433644;
    background:#1a0a0a;
  }
  .data-card.error-card .label{color:#f44336;font-weight:700;font-size:11px;}
  .data-card.error-card .value{color:#f44336;font-size:22px;}
  .data-card.error-card.has-error{
    animation:flashError 0.8s ease-in-out infinite;
    border-width:2px;
  }
  .data-card.error-card.has-error .value{
    color:#ff1744;
    font-size:26px;
    text-shadow:0 0 10px #ff1744aa;
  }

  /* ===== CENTER ===== */
  .center{display:flex;flex-direction:column;overflow:hidden;}
  .center-top{flex:1;padding:12px;display:flex;flex-direction:column;min-height:0;}
  .graph-header{display:flex;align-items:center;gap:12px;margin-bottom:8px;flex-shrink:0;}
  .graph-header select{background:#222;color:var(--text);border:1px solid var(--border);padding:4px 8px;border-radius:4px;font-size:12px;}
  .chart-wrap{flex:1;position:relative;min-height:0;max-width:85%;}
  .chart-wrap canvas{position:absolute;top:0;left:0;width:100%!important;height:100%!important;}

  .center-bottom{height:200px;border-top:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
  .log-header{padding:8px 12px;font-size:12px;color:var(--accent);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
  .log-header button{background:#333;color:var(--text);border:none;padding:2px 10px;border-radius:3px;cursor:pointer;font-size:11px;}
  #logArea{flex:1;overflow-y:auto;padding:6px 12px;font-family:'Courier New',monospace;font-size:11px;color:#aaa;}
  #logArea .log-entry{padding:2px 0;border-bottom:1px solid #1a1a1a;}
  #logArea .ts{color:var(--dim);margin-right:8px;}

  /* ===== RIGHT SIDEBAR ===== */
  .sidebar-right{background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:12px;gap:10px;overflow-y:auto;}

  /* RPM Gauge */
  .gauge-container{width:100%;text-align:center;}
  .gauge-container .gauge-title{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px;}
  .gauge-svg{width:260px;height:155px;}
  .gauge-value-text{font-size:40px;font-weight:700;font-family:'Courier New',monospace;color:#fff;margin-top:-10px;}
  .gauge-max-label{font-size:10px;color:var(--dim);}

  /* Speed display */
  .speed-display{text-align:center;margin-top:4px;}
  .speed-display .speed-num{font-size:64px;font-weight:800;font-family:'Courier New',monospace;line-height:1;color:#fff;}
  .speed-display .speed-unit{font-size:14px;color:var(--dim);}
  .speed-display .gear-badge{display:inline-block;background:var(--accent);color:#000;font-size:28px;font-weight:900;width:48px;height:48px;line-height:48px;border-radius:8px;margin-top:6px;}

  /* Indicators */
  .indicators{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:auto;padding-top:10px;}
  .ind{width:36px;height:36px;border-radius:50%;background:#222;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--dim);text-align:center;line-height:1.1;transition:all .3s;}
  .ind.on-green{border-color:var(--accent);background:#00e67622;color:var(--accent);}
  .ind.on-red{border-color:#f44336;background:#f4433622;color:#f44336;}
  .ind.on-yellow{border-color:#ffeb3b;background:#ffeb3b22;color:#ffeb3b;}

  /* Warn indicator pulsing when active */
  .ind.on-red-pulse{
    border-color:#f44336;background:#f4433644;color:#f44336;
    animation:pulseRed 0.7s ease-in-out infinite;
    width:44px;height:44px;font-size:10px;font-weight:700;
  }

  /* Right data cards */
  .right-data{width:100%;display:grid;grid-template-columns:1fr 1fr;gap:6px;}
  .right-data .data-card{background:#1e1e1e;}

  /* Scrollbar */
  ::-webkit-scrollbar{width:6px;}
  ::-webkit-scrollbar-track{background:var(--bg);}
  ::-webkit-scrollbar-thumb{background:#333;border-radius:3px;}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <h1>テレメトリー<span>v2</span></h1>
  <div id="connStatus"><div id="connDot"></div><span id="connText">ESP未接続…</span></div>
</header>

<!-- MAIN -->
<div class="main">

  <!-- LEFT SIDEBAR -->
  <div class="sidebar-left">
    <div class="panel-title">通信情報</div>
    <table class="info-table">
      <tr><td>状態</td><td id="infoState">切断</td></tr>
      <tr><td>方式</td><td id="infoMethod">Firebase RTDB</td></tr>
      <tr><td>更新頻度</td><td id="infoFreq">— Hz</td></tr>
      <tr><td>最終受信</td><td id="infoLast">—</td></tr>
    </table>

    <div class="panel-title">データ数値</div>
    <div class="data-grid">
      <div class="data-card"><div class="label">TPS</div><div class="value" id="dTps">—</div><div class="unit">%</div></div>
      <div class="data-card"><div class="label">MAP</div><div class="value" id="dMap">—</div><div class="unit">kPa</div></div>
      <div class="data-card"><div class="label">Lambda</div><div class="value" id="dLambda">—</div><div class="unit"></div></div>
      <div class="data-card"><div class="label">水温</div><div class="value" id="dWater">—</div><div class="unit">°C</div></div>
      <div class="data-card"><div class="label">吸気温</div><div class="value" id="dAir">—</div><div class="unit">°C</div></div>
      <div class="data-card"><div class="label">油温</div><div class="value" id="dOilT">—</div><div class="unit">°C</div></div>
      <div class="data-card"><div class="label">油圧</div><div class="value" id="dOilP">—</div><div class="unit">kPa</div></div>
      <div class="data-card"><div class="label">燃圧</div><div class="value" id="dFuelP">—</div><div class="unit">kPa</div></div>
      <div class="data-card"><div class="label">電圧</div><div class="value" id="dVolts">—</div><div class="unit">V</div></div>
      <div class="data-card"><div class="label">噴射時間</div><div class="value" id="dInj">—</div><div class="unit">ms</div></div>
      <div class="data-card full"><div class="label">総燃料消費</div><div class="value" id="dTotalFuel">—</div><div class="unit">L</div></div>
      <div class="data-card"><div class="label">燃料 g/s</div><div class="value" id="dFuelGs">—</div><div class="unit">g/s</div></div>
      <div class="data-card"><div class="label">燃料 L/h</div><div class="value" id="dFuelLph">—</div><div class="unit">L/h</div></div>
      <div class="data-card error-card" id="crkCard"><div class="label">⚠ CRKエラー</div><div class="value" id="dCrkErr">—</div><div class="unit"></div></div>
      <div class="data-card error-card" id="camCard"><div class="label">⚠ CAMエラー</div><div class="value" id="dCamErr">—</div><div class="unit"></div></div>
    </div>
  </div>

  <!-- CENTER -->
  <div class="center">
    <div class="center-top">
      <div class="graph-header">
        <span class="panel-title" style="margin:0;border:none;padding:0;">グラフ</span>
        <select id="graphSelect">
          <option value="rpm">RPM</option>
          <option value="tps">TPS (%)</option>
          <option value="kph">車速 (km/h)</option>
          <option value="water_temp">水温 (°C)</option>
          <option value="air_temp">吸気温 (°C)</option>
          <option value="map_kpa">MAP (kPa)</option>
          <option value="lambda">Lambda</option>
          <option value="oil_p">油圧 (kPa)</option>
          <option value="oil_temp">油温 (°C)</option>
          <option value="fuel_p">燃圧 (kPa)</option>
          <option value="volts">電圧 (V)</option>
          <option value="injection_ms">噴射時間 (ms)</option>
          <option value="calc_fuel_gs">燃料 (g/s)</option>
          <option value="calc_fuel_lph">燃料 (L/h)</option>
        </select>
        <select id="graphRange">
          <option value="60">60秒</option>
          <option value="120">120秒</option>
          <option value="300">5分</option>
        </select>
      </div>
      <div class="chart-wrap"><canvas id="mainChart"></canvas></div>
    </div>
    <div class="center-bottom">
      <div class="log-header"><span>ログ</span><button onclick="clearLog()">クリア</button></div>
      <div id="logArea"></div>
    </div>
  </div>

  <!-- RIGHT SIDEBAR -->
  <div class="sidebar-right">
    <div class="gauge-container">
      <div class="gauge-title">RPM</div>
      <svg class="gauge-svg" viewBox="0 0 240 150">
        <!-- Background arc: center(120,130) r=100 -->
        <path d="M 20 130 A 100 100 0 0 1 220 130" fill="none" stroke="#2a2a2a" stroke-width="18" stroke-linecap="round"/>
        <!-- Value arc -->
        <path id="rpmArc" d="M 20 130 A 100 100 0 0 1 220 130" fill="none" stroke="url(#rpmGrad)" stroke-width="18" stroke-linecap="round" stroke-dasharray="0 999"/>
        <!-- Tick labels (outside arc at r=116, correct angular positions) -->
        <text x="4.0" y="130.0" fill="#555" font-size="10" text-anchor="middle" dominant-baseline="central">0</text>
        <text x="26.2" y="61.8" fill="#555" font-size="10" text-anchor="middle" dominant-baseline="central">3k</text>
        <text x="62.0" y="29.5" fill="#555" font-size="10" text-anchor="middle" dominant-baseline="central">5k</text>
        <text x="120.0" y="14.0" fill="#555" font-size="10" text-anchor="middle" dominant-baseline="central">7.5k</text>
        <text x="178.0" y="29.5" fill="#555" font-size="10" text-anchor="middle" dominant-baseline="central">10k</text>
        <text x="213.8" y="61.8" fill="#555" font-size="10" text-anchor="middle" dominant-baseline="central">12k</text>
        <text x="236.0" y="130.0" fill="#555" font-size="10" text-anchor="middle" dominant-baseline="central">15k</text>
        <defs>
          <linearGradient id="rpmGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#00e676"/>
            <stop offset="60%" stop-color="#ffeb3b"/>
            <stop offset="100%" stop-color="#f44336"/>
          </linearGradient>
        </defs>
      </svg>
      <div class="gauge-value-text" id="rpmValue">0</div>
      <div class="gauge-max-label">/ 15000</div>
    </div>

    <div class="speed-display">
      <div class="speed-num" id="speedValue">0</div>
      <div class="speed-unit">km/h</div>
      <div><div class="gear-badge" id="gearValue">N</div></div>
    </div>

    <div class="right-data">
      <div class="data-card"><div class="label">水温</div><div class="value" id="rWater">—</div><div class="unit">°C</div></div>
      <div class="data-card"><div class="label">電圧</div><div class="value" id="rVolts">—</div><div class="unit">V</div></div>
    </div>

    <div class="indicators">
      <div class="ind" id="indConn" title="接続">接続</div>
      <div class="ind" id="indEngine" title="エンジン">ENG</div>
      <div class="ind" id="indWarn" title="警告">WARN</div>
      <div class="ind" id="indFuel" title="燃料">FUEL</div>
      <div class="ind" id="indTemp" title="温度">TEMP</div>
    </div>
  </div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
// ========== Firebase Config ==========
const firebaseConfig = {
  apiKey: "AIzaSyDf7A3PnHBnx3z6T4sq_44jdq1Ys7CdGnE",
  authDomain: "ofrac-telemetry.firebaseapp.com",
  databaseURL: "https://ofrac-telemetry-default-rtdb.firebaseio.com",
  projectId: "ofrac-telemetry",
  storageBucket: "ofrac-telemetry.firebasestorage.app",
  messagingSenderId: "529837424020",
  appId: "1:529837424020:web:0a7da56e8f154b92132381",
  measurementId: "G-P12HV5QXYK"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const dataRef = db.ref("livedata/dashboard");

// ========== State ==========
let lastTs = 0;
let updateCount = 0;
let freqInterval = null;
const history = {};
const DATA_KEYS = ['rpm','tps','kph','gear','water_temp','air_temp','map_kpa','lambda',
  'oil_p','oil_temp','fuel_p','volts','crank_errors','cam_errors','injection_ms',
  'calc_fuel_gs','calc_fuel_lph','total_fuel_l','fuel_lph'];
DATA_KEYS.forEach(k => history[k] = []);

// ========== Chart Setup ==========
const ctx = document.getElementById('mainChart').getContext('2d');
const chart = new Chart(ctx, {
  type: 'line',
  data: { labels: [], datasets: [{ label: 'RPM', data: [], borderColor: '#00e676', backgroundColor: 'rgba(0,230,118,0.08)', borderWidth: 1.5, pointRadius: 0, tension: 0.3, fill: true }] },
  options: {
    responsive: true, maintainAspectRatio: false,
    animation: { duration: 0 },
    scales: {
      x: { display: true, grid: { color: '#1e1e1e' }, ticks: { color: '#555', font: { size: 10 }, maxTicksLimit: 10 } },
      y: { display: true, grid: { color: '#1e1e1e' }, ticks: { color: '#555', font: { size: 10 } } }
    },
    plugins: { legend: { display: false } }
  }
});

// ========== Gauge ==========
const RPM_MAX = 15000;
const ARC_LENGTH = Math.PI * 100;

function setRpmGauge(rpm) {
  const clamped = Math.max(0, Math.min(rpm, RPM_MAX));
  const ratio = clamped / RPM_MAX;
  const dashLen = ratio * ARC_LENGTH;
  document.getElementById('rpmArc').setAttribute('stroke-dasharray', dashLen + ' ' + (ARC_LENGTH - dashLen + 10));
  document.getElementById('rpmValue').textContent = Math.round(rpm);
}

// ========== Log ==========
const logArea = document.getElementById('logArea');
let logCount = 0;
function addLog(msg) {
  logCount++;
  const div = document.createElement('div');
  div.className = 'log-entry';
  const now = new Date();
  const ts = now.toLocaleTimeString('ja-JP', { hour12: false }) + '.' + String(now.getMilliseconds()).padStart(3,'0');
  div.innerHTML = '<span class="ts">' + ts + '</span>' + msg;
  logArea.appendChild(div);
  if (logArea.children.length > 200) logArea.removeChild(logArea.firstChild);
  logArea.scrollTop = logArea.scrollHeight;
}
function clearLog() { logArea.innerHTML = ''; logCount = 0; }

// ========== Frequency tracker ==========
freqInterval = setInterval(() => {
  document.getElementById('infoFreq').textContent = updateCount + ' Hz';
  updateCount = 0;
}, 1000);

// ========== Error highlighting ==========
function updateErrorCards(d) {
  const crkCard = document.getElementById('crkCard');
  const camCard = document.getElementById('camCard');
  const crkVal = parseInt(d.crank_errors) || 0;
  const camVal = parseInt(d.cam_errors) || 0;

  if (crkVal > 0) {
    crkCard.classList.add('has-error');
  } else {
    crkCard.classList.remove('has-error');
  }
  if (camVal > 0) {
    camCard.classList.add('has-error');
  } else {
    camCard.classList.remove('has-error');
  }
}

// ========== Indicators ==========
function updateIndicators(d) {
  const conn = document.getElementById('indConn');
  conn.className = 'ind on-green';

  const eng = document.getElementById('indEngine');
  eng.className = (d.rpm && d.rpm > 0) ? 'ind on-green' : 'ind';

  const temp = document.getElementById('indTemp');
  temp.className = (d.water_temp && d.water_temp > 100) ? 'ind on-red' : 'ind on-green';

  const warn = document.getElementById('indWarn');
  const hasError = (d.crank_errors && d.crank_errors > 0) || (d.cam_errors && d.cam_errors > 0);
  warn.className = hasError ? 'ind on-red-pulse' : 'ind';

  const fuel = document.getElementById('indFuel');
  fuel.className = (d.fuel_p && d.fuel_p < 200) ? 'ind on-yellow' : 'ind on-green';
}

// ========== Firebase Listener ==========
dataRef.on('value', snap => {
  const d = snap.val();
  if (!d) return;

  updateCount++;
  const now = Date.now();
  const timeLabel = new Date().toLocaleTimeString('ja-JP', { hour12: false, minute:'2-digit', second:'2-digit' });

  // Connection status
  document.getElementById('connDot').classList.add('ok');
  document.getElementById('connText').textContent = 'ESP接続中';
  document.getElementById('connStatus').classList.add('connected');
  document.getElementById('infoState').textContent = '接続';
  document.getElementById('infoLast').textContent = timeLabel;

  // Store history
  DATA_KEYS.forEach(k => {
    if (d[k] !== undefined) {
      history[k].push({ t: timeLabel, v: parseFloat(d[k]) || 0 });
      const maxLen = parseInt(document.getElementById('graphRange').value) * 10;
      if (history[k].length > maxLen) history[k].shift();
    }
  });

  // Left sidebar data cards
  const setVal = (id, val, dec) => {
    const el = document.getElementById(id);
    if (el && val !== undefined) el.textContent = (typeof val === 'number') ? val.toFixed(dec !== undefined ? dec : 1) : val;
  };
  setVal('dTps', d.tps, 1);
  setVal('dMap', d.map_kpa, 0);
  setVal('dLambda', d.lambda, 2);
  setVal('dWater', d.water_temp, 1);
  setVal('dAir', d.air_temp, 1);
  setVal('dOilT', d.oil_temp, 1);
  setVal('dOilP', d.oil_p, 0);
  setVal('dFuelP', d.fuel_p, 0);
  setVal('dVolts', d.volts, 1);
  setVal('dInj', d.injection_ms, 2);
  setVal('dTotalFuel', d.total_fuel_l, 3);
  setVal('dFuelGs', d.calc_fuel_gs, 2);
  setVal('dFuelLph', d.calc_fuel_lph, 2);
  setVal('dCrkErr', d.crank_errors, 0);
  setVal('dCamErr', d.cam_errors, 0);

  // Right sidebar
  setRpmGauge(d.rpm || 0);
  document.getElementById('speedValue').textContent = Math.round(d.kph || 0);
  document.getElementById('gearValue').textContent = (d.gear !== undefined && d.gear !== null) ? (d.gear == 0 ? 'N' : d.gear) : 'N';
  setVal('rWater', d.water_temp, 1);
  setVal('rVolts', d.volts, 1);

  // Error highlighting
  updateErrorCards(d);

  // Indicators
  updateIndicators(d);

  // Update chart
  const selKey = document.getElementById('graphSelect').value;
  const hist = history[selKey] || [];
  chart.data.labels = hist.map(h => h.t);
  chart.data.datasets[0].data = hist.map(h => h.v);
  chart.data.datasets[0].label = document.getElementById('graphSelect').selectedOptions[0].text;
  chart.update();

  // Log (throttle to ~2/sec)
  if (now - lastTs >= 500) {
    addLog('RPM:' + (d.rpm||0) + ' TPS:' + (d.tps||0) + ' 車速:' + (d.kph||0) + 'km/h ギア:' + (d.gear||'N') + ' 水温:' + (d.water_temp||0) + '°C');
    lastTs = now;
  }
});

// Handle disconnect
dataRef.on('child_removed', () => {
  document.getElementById('connDot').classList.remove('ok');
  document.getElementById('connText').textContent = 'ESP未接続…';
  document.getElementById('connStatus').classList.remove('connected');
  document.getElementById('infoState').textContent = '切断';
});

// Graph select change
document.getElementById('graphSelect').addEventListener('change', () => {
  const selKey = document.getElementById('graphSelect').value;
  const hist = history[selKey] || [];
  chart.data.labels = hist.map(h => h.t);
  chart.data.datasets[0].data = hist.map(h => h.v);
  chart.data.datasets[0].label = document.getElementById('graphSelect').selectedOptions[0].text;
  chart.update();
});
</script>
</body>
</html>
