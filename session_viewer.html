<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>セッション詳細 - テレメトリー</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    static.com/firebasejs/8.10.1/firebase-app.js"></script>
    static.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #f5f5f5;
            --panel: #ffffff;
            --border: #e0e0e0;
            --text: #212121;
            --dim: #888;
            --card: #f0f0f0;
            --accent: #2e7d32;
            --grid: #eee;
            --tick: #999;
        }

        [data-theme="dark"] {
            --bg: #0d1117;
            --panel: #161b22;
            --border: #30363d;
            --text: #e6edf3;
            --dim: #8b949e;
            --card: #21262d;
            --accent: #4caf50;
            --grid: #30363d;
            --tick: #8b949e;
        }

        body {
            font-family: 'Noto Sans JP', 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            font-size: 13px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            border-bottom: 1px solid var(--border);
            background: var(--panel);
            flex-shrink: 0;
        }

        h1 {
            font-size: 18px;
            font-weight: 700;
        }

        h1 span {
            color: var(--accent);
            font-size: 12px;
            margin-left: 8px;
        }

        .btns {
            display: flex;
            gap: 8px;
        }

        .btns button {
            background: var(--card);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            font-family: inherit;
        }

        .btns button:hover {
            opacity: .8;
        }

        .meta-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            padding: 8px 16px;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .meta-item .lbl {
            color: var(--dim);
            font-size: 10px;
            text-transform: uppercase;
            display: block;
        }

        .meta-item .val {
            font-weight: 700;
            font-size: 14px;
            font-family: 'Courier New', monospace;
        }

        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .sidebar {
            width: 240px;
            flex-shrink: 0;
            background: var(--panel);
            border-right: 1px solid var(--border);
            overflow-y: auto;
            padding: 8px;
        }

        .sidebar-title {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--accent);
            font-weight: 700;
            margin-bottom: 6px;
            padding-bottom: 4px;
            border-bottom: 1px solid var(--border);
        }

        .ch-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 8px;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 2px;
            transition: background .15s;
        }

        .ch-item:hover {
            background: var(--card);
        }

        .ch-item input {
            width: 15px;
            height: 15px;
            cursor: pointer;
            accent-color: var(--accent);
        }

        .ch-color {
            width: 12px;
            height: 12px;
            border-radius: 3px;
            flex-shrink: 0;
        }

        .ch-name {
            flex: 1;
            font-size: 12px;
        }

        .ch-unit {
            font-size: 10px;
            color: var(--dim);
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .range-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        .range-bar label {
            color: var(--dim);
            font-size: 12px;
        }

        .range-bar select {
            background: var(--card);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
        }

        /* 各チャンネル1グラフ */
        .chart-row {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 6px 10px;
            margin-bottom: 8px;
            position: relative;
        }

        .chart-row-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 2px;
        }

        .chart-row-title {
            font-size: 12px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .chart-row-stats {
            margin-left: auto;
            font-size: 11px;
            color: var(--dim);
            font-family: 'Courier New', monospace;
        }

        .chart-canvas-wrap {
            height: 150px;
            position: relative;
        }

        .empty {
            text-align: center;
            padding: 60px 20px;
            color: var(--dim);
            font-size: 15px;
        }

        .hint {
            font-size: 11px;
            color: var(--dim);
            margin-bottom: 8px;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }
    </style>
</head>

<body>
    <header>
        <h1>セッション詳細 <span id="sessName"></span></h1>
        <div class="btns">
            <button id="themeBtn" onclick="toggleTheme()">🌙</button>
            <button onclick="dlCSV()">CSV</button>
            <button onclick="dlJSON()">JSON</button>
            <button onclick="window.close()">✕ 閉じる</button>
        </div>
    </header>

    <div class="meta-bar" id="metaBar"></div>

    <div class="main">
        <div class="sidebar">
            <div class="sidebar-title">表示チャンネル</div>
            <div class="hint">チェックした項目が下に並びます</div>
            <div id="channelList"></div>
        </div>
        <div class="content" id="content">
            <div class="range-bar">
                <label>表示範囲:</label>
                <select id="rangeSel" onchange="drawAll()">
                    <option value="all">全体</option>
                    <option value="60">60秒</option>
                    <option value="120">120秒</option>
                    <option value="300">5分</option>
                </select>
            </div>
            <div id="chartsArea"></div>
        </div>
    </div>

    <script>
        // ========== テーマ ==========
        (function initTheme() {
            const saved = localStorage.getItem('telemetry-theme');
            if (saved === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                document.getElementById('themeBtn').textContent = '☀️';
            }
        })();
        function toggleTheme() {
            const html = document.documentElement;
            const isDark = html.getAttribute('data-theme') === 'dark';
            if (isDark) {
                html.removeAttribute('data-theme');
                document.getElementById('themeBtn').textContent = '🌙';
                localStorage.setItem('telemetry-theme', 'light');
            } else {
                html.setAttribute('data-theme', 'dark');
                document.getElementById('themeBtn').textContent = '☀️';
                localStorage.setItem('telemetry-theme', 'dark');
            }
            if (data) drawAll();
        }

        // ========== Firebase ==========
        const firebaseConfig = {
            apiKey: "AIzaSyDf7A3PnHBnx3z6T4sq_44jdq1Ys7CdGnE",
            authDomain: "ofrac-telemetry.firebaseapp.com",
            databaseURL: "https://ofrac-telemetry-default-rtdb.firebaseio.com",
            projectId: "ofrac-telemetry",
            storageBucket: "ofrac-telemetry.firebasestorage.app",
            messagingSenderId: "529837424020",
            appId: "1:529837424020:web:0a7da56e8f154b92132381"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const FIELDS = [
            { key: 'rpm', label: 'RPM', unit: '', color: '#e65100' },
            { key: 'kph', label: '車速', unit: 'km/h', color: '#1565c0' },
            { key: 'tps', label: 'TPS', unit: '%', color: '#2e7d32' },
            { key: 'gear', label: 'ギア', unit: '', color: '#6a1b9a' },
            { key: 'water_temp', label: '水温', unit: '°C', color: '#00838f' },
            { key: 'air_temp', label: '吸気温', unit: '°C', color: '#00acc1' },
            { key: 'oil_temp', label: '油温', unit: '°C', color: '#ad1457' },
            { key: 'oil_p', label: '油圧', unit: 'kPa', color: '#4527a0' },
            { key: 'fuel_p', label: '燃圧', unit: 'kPa', color: '#283593' },
            { key: 'map_kpa', label: 'MAP', unit: 'kPa', color: '#7b1fa2' },
            { key: 'lambda', label: 'Lambda', unit: '', color: '#f9a825' },
            { key: 'volts', label: '電圧', unit: 'V', color: '#c62828' },
            { key: 'injection_ms', label: '噴射時間', unit: 'ms', color: '#00695c' },
            { key: 'calc_fuel_gs', label: '燃料', unit: 'g/s', color: '#ef6c00' },
            { key: 'calc_fuel_lph', label: '燃料', unit: 'L/h', color: '#5d4037' },
            { key: 'total_fuel_l', label: '総燃料', unit: 'L', color: '#455a64' },
            { key: 'crank_errors', label: 'CRKエラー', unit: '', color: '#d32f2f' },
            { key: 'cam_errors', label: 'CAMエラー', unit: '', color: '#f44336' },
        ];

        const id = new URLSearchParams(location.search).get('id');
        let meta = null, data = null;
        let selected = ['rpm', 'kph', 'water_temp'];   // 初期選択（この順で並ぶ）
        let charts = [];   // 生成したChartインスタンス

        if (!id) {
            showEmpty('セッションIDが指定されていません');
        } else {
            db.ref('sessions/' + id).once('value').then(snap => {
                const s = snap.val();
                if (!s || !s.meta || !s.data) { showEmpty('セッションデータが見つかりませんでした'); return; }
                meta = s.meta;
                data = JSON.parse(s.data);
                if (!data || data.length === 0) { showEmpty('データが空です'); return; }
                renderAll();
            }).catch(err => showEmpty('読み込み失敗: ' + err.message));
        }

        function showEmpty(msg) {
            document.querySelector('.main').innerHTML = '<div class="empty">' + msg + '</div>';
        }

        function renderAll() {
            document.getElementById('sessName').textContent = meta.name;

            const dur = Math.floor(meta.duration / 60000) + '分' + Math.floor((meta.duration % 60000) / 1000) + '秒';
            const date = new Date(meta.startTime).toLocaleString('ja-JP', { hour12: false });
            document.getElementById('metaBar').innerHTML = `
        <div class="meta-item"><span class="lbl">開始日時</span><span class="val">${date}</span></div>
        <div class="meta-item"><span class="lbl">記録時間</span><span class="val">${dur}</span></div>
        <div class="meta-item"><span class="lbl">データ点数</span><span class="val">${meta.pointCount} pt</span></div>
        <div class="meta-item"><span class="lbl">モード</span><span class="val">${meta.mode === 'auto' ? '自動' : '手動'}</span></div>
        ${meta.memo ? `<div class="meta-item"><span class="lbl">メモ</span><span class="val">${escapeHtml(meta.memo)}</span></div>` : ''}
      `;

            // 左サイドバー
            const list = document.getElementById('channelList');
            list.innerHTML = '';
            FIELDS.forEach(f => {
                const vals = data.map(p => parseFloat(p[f.key])).filter(v => !isNaN(v));
                if (vals.length === 0) return;
                const div = document.createElement('div');
                div.className = 'ch-item';
                div.innerHTML = `
          <input type="checkbox" data-key="${f.key}" ${selected.includes(f.key) ? 'checked' : ''}>
          <span class="ch-color" style="background:${f.color}"></span>
          <span class="ch-name">${f.label}</span>
          <span class="ch-unit">${f.unit}</span>
        `;
                div.querySelector('input').addEventListener('change', e => {
                    if (e.target.checked) {
                        if (!selected.includes(f.key)) selected.push(f.key);
                    } else {
                        selected = selected.filter(k => k !== f.key);
                    }
                    drawAll();
                });
                div.addEventListener('click', e => {
                    if (e.target.tagName !== 'INPUT') {
                        const chk = div.querySelector('input');
                        chk.checked = !chk.checked;
                        chk.dispatchEvent(new Event('change'));
                    }
                });
                list.appendChild(div);
            });

            drawAll();
        }

        // ========== 選択チャンネルを1つずつ縦に並べて描画 ==========
        function drawAll() {
            // 既存チャート破棄
            charts.forEach(c => c.destroy());
            charts = [];
            const area = document.getElementById('chartsArea');
            area.innerHTML = '';

            if (selected.length === 0) {
                area.innerHTML = '<div class="empty">左のリストからチャンネルを選択してください</div>';
                return;
            }

            // 表示範囲フィルタ
            const rangeVal = document.getElementById('rangeSel').value;
            const t0 = data[0].ts;
            const tEnd = data[data.length - 1].ts;
            let cutoff = t0;
            if (rangeVal !== 'all') cutoff = tEnd - parseInt(rangeVal) * 1000;
            const viewData = data.filter(p => p.ts >= cutoff);
            const vt0 = viewData.length ? viewData[0].ts : t0;
            const labels = viewData.map(p => ((p.ts - vt0) / 1000).toFixed(0) + 's');

            const gridColor = getComputedStyle(document.documentElement).getPropertyValue('--grid').trim();
            const tickColor = getComputedStyle(document.documentElement).getPropertyValue('--tick').trim();

            // selected の順に1グラフずつ生成
            selected.forEach(key => {
                const f = FIELDS.find(x => x.key === key);
                if (!f) return;
                const vals = viewData.map(p => parseFloat(p[key]) || 0);
                const allVals = vals.filter(v => !isNaN(v));
                const mn = allVals.length ? Math.min(...allVals) : 0;
                const mx = allVals.length ? Math.max(...allVals) : 0;
                const av = allVals.length ? allVals.reduce((a, b) => a + b, 0) / allVals.length : 0;

                const row = document.createElement('div');
                row.className = 'chart-row';
                row.innerHTML = `
          <div class="chart-row-header">
            <span class="chart-row-title">
              <span class="ch-color" style="background:${f.color}"></span>
              ${f.label}${f.unit ? ' (' + f.unit + ')' : ''}
            </span>
            <span class="chart-row-stats">最小 ${fmt(mn)} ｜ 最大 ${fmt(mx)} ｜ 平均 ${fmt(av)}</span>
          </div>
          <div class="chart-canvas-wrap"><canvas></canvas></div>
        `;
                area.appendChild(row);

                const ctx = row.querySelector('canvas').getContext('2d');
                const chart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels, datasets: [{
                            label: f.label,
                            data: vals,
                            borderColor: f.color,
                            backgroundColor: f.color + '18',
                            borderWidth: 1.3, pointRadius: 0, tension: 0.25, fill: true
                        }]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false, animation: { duration: 0 },
                        interaction: { mode: 'index', intersect: false },
                        scales: {
                            x: { grid: { color: gridColor }, ticks: { color: tickColor, maxTicksLimit: 12, font: { size: 9 } } },
                            y: { grid: { color: gridColor }, ticks: { color: tickColor, font: { size: 9 } } }
                        },
                        plugins: { legend: { display: false } }
                    }
                });
                charts.push(chart);
            });
        }

        function fmt(n) { return Math.abs(n) >= 100 ? n.toFixed(0) : n.toFixed(2); }
        function escapeHtml(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

        // ========== ダウンロード ==========
        function dlCSV() {
            if (!data) return;
            const keys = FIELDS.map(f => f.key);
            const headers = ['Timestamp', 'Time', ...FIELDS.map(f => f.label + (f.unit ? '(' + f.unit + ')' : ''))];
            const rows = data.map(p => {
                const t = new Date(p.ts).toLocaleTimeString('ja-JP', { hour12: false });
                return [p.ts, t, ...keys.map(k => p[k] !== undefined ? p[k] : '')];
            });
            const csv = '\uFEFF' + [
                headers.map(h => '"' + h + '"').join(','),
                ...rows.map(r => r.map(c => '"' + String(c).replace(/"/g, '""') + '"').join(','))
            ].join('\n');
            dl(csv, 'telemetry_' + meta.name.replace(/[\/\\:*?"<>|]/g, '_') + '.csv', 'text/csv;charset=utf-8;');
        }
        function dlJSON() {
            if (!data) return;
            dl(JSON.stringify({ session: meta, dataPoints: data }, null, 2),
                'telemetry_' + meta.name.replace(/[\/\\:*?"<>|]/g, '_') + '.json', 'application/json');
        }
        function dl(content, name, type) {
            const b = new Blob([content], { type });
            const u = URL.createObjectURL(b);
            const a = document.createElement('a');
            a.href = u; a.download = name; document.body.appendChild(a); a.click();
            document.body.removeChild(a); URL.revokeObjectURL(u);
        }
    </script>
</body>

</html>
