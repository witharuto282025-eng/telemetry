<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>セッション詳細 - テレメトリー</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- ★ Firebase SDK 追加 -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    .js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans JP', 'Segoe UI', sans-serif;
            background: #0d1117;
            color: #e6edf3;
            padding: 16px;
            font-size: 13px;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 12px;
            border-bottom: 1px solid #30363d;
            margin-bottom: 16px;
        }

        h1 {
            font-size: 18px;
            font-weight: 700;
        }

        h1 span {
            color: #4caf50;
            font-size: 12px;
            margin-left: 8px;
        }

        .back-btn {
            background: #21262d;
            color: #e6edf3;
            border: 1px solid #30363d;
            padding: 6px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
        }

        .back-btn:hover {
            background: #30363d;
        }

        .meta-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            padding: 12px 16px;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            margin-bottom: 16px;
        }

        .meta-item {
            font-size: 12px;
        }

        .meta-item .lbl {
            color: #8b949e;
            font-size: 10px;
            text-transform: uppercase;
            display: block;
        }

        .meta-item .val {
            font-weight: 700;
            font-size: 14px;
            font-family: 'Courier New', monospace;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 10px 12px;
        }

        .stat-card .name {
            color: #8b949e;
            font-size: 11px;
            margin-bottom: 4px;
        }

        .stat-card .row {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            padding: 1px 0;
        }

        .stat-card .row .k {
            color: #8b949e;
        }

        .stat-card .row .v {
            font-family: 'Courier New', monospace;
            font-weight: 700;
        }

        .chart-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        .chart-controls select {
            background: #21262d;
            color: #e6edf3;
            border: 1px solid #30363d;
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 12px;
        }

        .chart-box {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 16px;
            height: 340px;
        }

        .empty {
            text-align: center;
            padding: 60px 20px;
            color: #8b949e;
            font-size: 15px;
        }

        .dl-btns {
            display: flex;
            gap: 8px;
        }

        .dl-btns button {
            background: #21262d;
            color: #e6edf3;
            border: 1px solid #30363d;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
        }

        .dl-btns button:hover {
            background: #30363d;
        }
    </style>
</head>

<body>
    <header>
        <h1>セッション詳細 <span id="sessName"></span></h1>
        <div class="dl-btns">
            <button onclick="dlCSV()">CSV</button>
            <button onclick="dlJSON()">JSON</button>
            <button class="back-btn" onclick="window.close()">✕ 閉じる</button>
        </div>
    </header>

    <div id="content">
        <div class="meta-bar" id="metaBar"></div>
        <div class="stats-grid" id="statsGrid"></div>
        <div class="chart-controls">
            <label style="color:#8b949e;">グラフ項目:</label>
            <select id="chartSelect"></select>
        </div>
        <div class="chart-box"><canvas id="mainChart"></canvas></div>
    </div>

    <script>
        // ========== Firebase 初期化 ==========
        const firebaseConfig = {
            apiKey: "AIzaSyDf7A3PnHBnx3z6T4sq_44jdq1Ys7CdGnE",
            authDomain: "ofrac-telemetry.firebaseapp.com",
            databaseURL: "https://ofrac-telemetry-default-rtdb.firebaseio.com",
            projectId: "ofrac-telemetry",
            storageBucket: "ofrac-telemetry.firebasestorage.app",
            messagingSenderId: "529837424020",
            appId: "1:529837424020:web:0a7da56e8f154b92132381"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const FIELDS = [
            { key: 'rpm', label: 'RPM', unit: '' },
            { key: 'tps', label: 'TPS', unit: '%' },
            { key: 'kph', label: '車速', unit: 'km/h' },
            { key: 'water_temp', label: '水温', unit: '°C' },
            { key: 'air_temp', label: '吸気温', unit: '°C' },
            { key: 'map_kpa', label: 'MAP', unit: 'kPa' },
            { key: 'lambda', label: 'Lambda', unit: '' },
            { key: 'oil_p', label: '油圧', unit: 'kPa' },
            { key: 'oil_temp', label: '油温', unit: '°C' },
            { key: 'fuel_p', label: '燃圧', unit: 'kPa' },
            { key: 'volts', label: '電圧', unit: 'V' },
            { key: 'injection_ms', label: '噴射時間', unit: 'ms' },
            { key: 'calc_fuel_gs', label: '燃料', unit: 'g/s' },
            { key: 'calc_fuel_lph', label: '燃料', unit: 'L/h' },
            { key: 'total_fuel_l', label: '総燃料', unit: 'L' },
            { key: 'crank_errors', label: 'CRKエラー', unit: '' },
            { key: 'cam_errors', label: 'CAMエラー', unit: '' },
        ];

        // ========== URLパラメータからID取得 ==========
        const id = new URLSearchParams(location.search).get('id');

        let meta = null, data = null;

        // ========== ★ Firebaseから読み込み ==========
        if (!id) {
            showEmpty('セッションIDが指定されていません');
        } else {
            db.ref('sessions/' + id).once('value').then(snap => {
                const s = snap.val();
                if (!s || !s.meta || !s.data) {
                    showEmpty('セッションデータが見つかりませんでした');
                    return;
                }
                meta = s.meta;
                data = JSON.parse(s.data);   // JSON文字列を配列に戻す
                if (!data || data.length === 0) {
                    showEmpty('データが空です');
                    return;
                }
                renderAll();
            }).catch(err => {
                showEmpty('読み込み失敗: ' + err.message);
            });
        }

        function showEmpty(msg) {
            document.getElementById('content').innerHTML =
                '<div class="empty">' + msg + '</div>';
        }

        // ========== 描画 ==========
        function renderAll() {
            document.getElementById('sessName').textContent = meta.name;

            const dur = Math.floor(meta.duration / 60000) + '分' + Math.floor((meta.duration % 60000) / 1000) + '秒';
            const date = new Date(meta.startTime).toLocaleString('ja-JP', { hour12: false });
            document.getElementById('metaBar').innerHTML = `
        <div class="meta-item"><span class="lbl">開始日時</span><span class="val">${date}</span></div>
        <div class="meta-item"><span class="lbl">記録時間</span><span class="val">${dur}</span></div>
        <div class="meta-item"><span class="lbl">データ点数</span><span class="val">${meta.pointCount} pt</span></div>
        <div class="meta-item"><span class="lbl">モード</span><span class="val">${meta.mode === 'auto' ? '自動' : '手動'}</span></div>
        ${meta.memo ? `<div class="meta-item"><span class="lbl">メモ</span><span class="val">${escapeHtml(meta.memo)}</span></div>` : ''}
      `;

            const grid = document.getElementById('statsGrid');
            grid.innerHTML = '';
            FIELDS.forEach(f => {
                const vals = data.map(p => parseFloat(p[f.key])).filter(v => !isNaN(v));
                if (vals.length === 0) return;
                const min = Math.min(...vals), max = Math.max(...vals);
                const avg = vals.reduce((a, b) => a + b, 0) / vals.length;
                const card = document.createElement('div');
                card.className = 'stat-card';
                card.innerHTML = `
          <div class="name">${f.label}${f.unit ? ' (' + f.unit + ')' : ''}</div>
          <div class="row"><span class="k">最小</span><span class="v">${fmt(min)}</span></div>
          <div class="row"><span class="k">最大</span><span class="v">${fmt(max)}</span></div>
          <div class="row"><span class="k">平均</span><span class="v">${fmt(avg)}</span></div>
        `;
                grid.appendChild(card);
            });

            const sel = document.getElementById('chartSelect');
            sel.innerHTML = '';
            FIELDS.forEach(f => {
                const o = document.createElement('option');
                o.value = f.key;
                o.textContent = f.label + (f.unit ? ' (' + f.unit + ')' : '');
                sel.appendChild(o);
            });
            sel.value = 'rpm';
            sel.addEventListener('change', drawChart);
            drawChart();
        }

        let chart = null;
        function drawChart() {
            const key = document.getElementById('chartSelect').value;
            const field = FIELDS.find(f => f.key === key);
            const t0 = data[0].ts;
            const labels = data.map(p => ((p.ts - t0) / 1000).toFixed(0) + 's');
            const vals = data.map(p => parseFloat(p[key]) || 0);
            if (chart) chart.destroy();
            chart = new Chart(document.getElementById('mainChart').getContext('2d'), {
                type: 'line',
                data: {
                    labels, datasets: [{
                        label: field.label + (field.unit ? ' (' + field.unit + ')' : ''),
                        data: vals, borderColor: '#4caf50',
                        backgroundColor: 'rgba(76,175,80,0.1)',
                        borderWidth: 1.5, pointRadius: 0, tension: 0.3, fill: true
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false, animation: { duration: 0 },
                    scales: {
                        x: { grid: { color: '#30363d' }, ticks: { color: '#8b949e', maxTicksLimit: 12, font: { size: 10 } } },
                        y: { grid: { color: '#30363d' }, ticks: { color: '#8b949e', font: { size: 10 } } }
                    },
                    plugins: { legend: { labels: { color: '#e6edf3' } } }
                }
            });
        }

        function fmt(n) { return Math.abs(n) >= 100 ? n.toFixed(0) : n.toFixed(2); }
        function escapeHtml(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

        // ========== ダウンロード ==========
        function dlCSV() {
            if (!data) return;
            const keys = FIELDS.map(f => f.key);
            const headers = ['Timestamp', 'Time', ...FIELDS.map(f => f.label + (f.unit ? '(' + f.unit + ')' : ''))];
            const rows = data.map(p => {
                const t = new Date(p.ts).toLocaleTimeString('ja-JP', { hour12: false });
                return [p.ts, t, ...keys.map(k => p[k] !== undefined ? p'')];
            });
            const csv = '\uFEFF' + [
                headers.map(h => '"' + h + '"').join(','),
                ...rows.map(r => r.map(c => '"' + String(c).replace(/"/g, '""') + '"').join(','))
            ].join('\n');
            dl(csv, 'telemetry_' + meta.name.replace(/[\/\\:*?"<>|]/g, '_') + '.csv', 'text/csv;charset=utf-8;');
        }
        function dlJSON() {
            if (!data) return;
            dl(JSON.stringify({ session: meta, dataPoints: data }, null, 2),
                'telemetry_' + meta.name.replace(/[\/\\:*?"<>|]/g, '_') + '.json', 'application/json');
        }
        function dl(content, name, type) {
            const b = new Blob([content], { type });
            const u = URL.createObjectURL(b);
            const a = document.createElement('a');
            a.href = u; a.download = name; document.body.appendChild(a); a.click();
            document.body.removeChild(a); URL.revokeObjectURL(u);
        }
    </script>
</body>

</html>
