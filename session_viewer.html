<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>セッション詳細 - テレメトリー</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #f5f5f5;
            --panel: #ffffff;
            --border: #e0e0e0;
            --text: #212121;
            --dim: #888;
            --card: #f0f0f0;
            --accent: #2e7d32;
            --grid: #eee;
            --tick: #999;
        }

        [data-theme="dark"] {
            --bg: #0d1117;
            --panel: #161b22;
            --border: #30363d;
            --text: #e6edf3;
            --dim: #8b949e;
            --card: #21262d;
            --accent: #4caf50;
            --grid: #30363d;
            --tick: #8b949e;
        }

        body {
            font-family: 'Noto Sans JP', 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            font-size: 13px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            border-bottom: 1px solid var(--border);
            background: var(--panel);
            flex-shrink: 0;
        }

        h1 {
            font-size: 18px;
            font-weight: 700;
        }

        h1 span {
            color: var(--accent);
            font-size: 12px;
            margin-left: 8px;
        }

        .btns {
            display: flex;
            gap: 8px;
        }

        .btns button {
            background: var(--card);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            font-family: inherit;
        }

        .btns button:hover {
            opacity: .8;
        }

        .meta-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            padding: 8px 16px;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .meta-item .lbl {
            color: var(--dim);
            font-size: 10px;
            text-transform: uppercase;
            display: block;
        }

        .meta-item .val {
            font-weight: 700;
            font-size: 14px;
            font-family: 'Courier New', monospace;
        }

        /* ===== メインレイアウト：左サイドバー + 右コンテンツ ===== */
        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .sidebar {
            width: 240px;
            flex-shrink: 0;
            background: var(--panel);
            border-right: 1px solid var(--border);
            overflow-y: auto;
            padding: 8px;
        }

        .sidebar-title {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--accent);
            font-weight: 700;
            margin-bottom: 6px;
            padding-bottom: 4px;
            border-bottom: 1px solid var(--border);
        }

        .ch-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 8px;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 2px;
            transition: background .15s;
        }

        .ch-item:hover {
            background: var(--card);
        }

        .ch-item input {
            width: 15px;
            height: 15px;
            cursor: pointer;
            accent-color: var(--accent);
        }

        .ch-color {
            width: 12px;
            height: 12px;
            border-radius: 3px;
            flex-shrink: 0;
        }

        .ch-name {
            flex: 1;
            font-size: 12px;
        }

        .ch-unit {
            font-size: 10px;
            color: var(--dim);
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .chart-box {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
            height: 420px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 8px;
            margin-bottom: 12px;
        }

        .stat-card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 10px;
        }

        .stat-card .name {
            color: var(--dim);
            font-size: 11px;
            margin-bottom: 3px;
            font-weight: 600;
        }

        .stat-card .row {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            padding: 1px 0;
        }

        .stat-card .row .k {
            color: var(--dim);
        }

        .stat-card .row .v {
            font-family: 'Courier New', monospace;
            font-weight: 700;
        }

        .empty {
            text-align: center;
            padding: 60px 20px;
            color: var(--dim);
            font-size: 15px;
        }

        .hint {
            font-size: 11px;
            color: var(--dim);
            margin-bottom: 8px;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }
    </style>
</head>

<body>
    <header>
        <h1>セッション詳細 <span id="sessName"></span></h1>
        <div class="btns">
            <button id="themeBtn" onclick="toggleTheme()">🌙</button>
            <button onclick="dlCSV()">CSV</button>
            <button onclick="dlJSON()">JSON</button>
            <button onclick="window.close()">✕ 閉じる</button>
        </div>
    </header>

    <div class="meta-bar" id="metaBar"></div>

    <div class="main">
        <!-- 左：チャンネル選択 -->
        <div class="sidebar">
            <div class="sidebar-title">表示チャンネル</div>
            <div class="hint">チェックした項目を右に重ねて表示</div>
            <div id="channelList"></div>
        </div>
        <!-- 右：グラフ + 統計 -->
        <div class="content" id="content">
            <div class="chart-box"><canvas id="mainChart"></canvas></div>
            <div class="stats-grid" id="statsGrid"></div>
        </div>
    </div>

    <script>
        // ========== テーマ ==========
        (function initTheme() {
            const saved = localStorage.getItem('telemetry-theme');
            if (saved === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                document.getElementById('themeBtn').textContent = '☀️';
            }
        })();
        function toggleTheme() {
            const html = document.documentElement;
            const isDark = html.getAttribute('data-theme') === 'dark';
            if (isDark) {
                html.removeAttribute('data-theme');
                document.getElementById('themeBtn').textContent = '🌙';
                localStorage.setItem('telemetry-theme', 'light');
            } else {
                html.setAttribute('data-theme', 'dark');
                document.getElementById('themeBtn').textContent = '☀️';
                localStorage.setItem('telemetry-theme', 'dark');
            }
            if (data) drawChart();   // グラフの色を再描画
        }

        // ========== Firebase 初期化 ==========
        const firebaseConfig = {
            apiKey: "AIzaSyDf7A3PnHBnx3z6T4sq_44jdq1Ys7CdGnE",
            authDomain: "ofrac-telemetry.firebaseapp.com",
            databaseURL: "https://ofrac-telemetry-default-rtdb.firebaseio.com",
            projectId: "ofrac-telemetry",
            storageBucket: "ofrac-telemetry.firebasestorage.app",
            messagingSenderId: "529837424020",
            appId: "1:529837424020:web:0a7da56e8f154b92132381"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ========== チャンネル定義（色付き） ==========
        const FIELDS = [
            { key: 'rpm', label: 'RPM', unit: '', color: '#e65100' },
            { key: 'kph', label: '車速', unit: 'km/h', color: '#1565c0' },
            { key: 'tps', label: 'TPS', unit: '%', color: '#2e7d32' },
            { key: 'gear', label: 'ギア', unit: '', color: '#6a1b9a' },
            { key: 'water_temp', label: '水温', unit: '°C', color: '#00838f' },
            { key: 'air_temp', label: '吸気温', unit: '°C', color: '#00acc1' },
            { key: 'oil_temp', label: '油温', unit: '°C', color: '#ad1457' },
            { key: 'oil_p', label: '油圧', unit: 'kPa', color: '#4527a0' },
            { key: 'fuel_p', label: '燃圧', unit: 'kPa', color: '#283593' },
            { key: 'map_kpa', label: 'MAP', unit: 'kPa', color: '#7b1fa2' },
            { key: 'lambda', label: 'Lambda', unit: '', color: '#f9a825' },
            { key: 'volts', label: '電圧', unit: 'V', color: '#c62828' },
            { key: 'injection_ms', label: '噴射時間', unit: 'ms', color: '#00695c' },
            { key: 'calc_fuel_gs', label: '燃料', unit: 'g/s', color: '#ef6c00' },
            { key: 'calc_fuel_lph', label: '燃料', unit: 'L/h', color: '#5d4037' },
            { key: 'total_fuel_l', label: '総燃料', unit: 'L', color: '#455a64' },
            { key: 'crank_errors', label: 'CRKエラー', unit: '', color: '#d32f2f' },
            { key: 'cam_errors', label: 'CAMエラー', unit: '', color: '#f44336' },
        ];

        const id = new URLSearchParams(location.search).get('id');
        let meta = null, data = null;
        let selected = new Set(['rpm']);   // 初期選択

        if (!id) {
            showEmpty('セッションIDが指定されていません');
        } else {
            db.ref('sessions/' + id).once('value').then(snap => {
                const s = snap.val();
                if (!s || !s.meta || !s.data) { showEmpty('セッションデータが見つかりませんでした'); return; }
                meta = s.meta;
                data = JSON.parse(s.data);
                if (!data || data.length === 0) { showEmpty('データが空です'); return; }
                renderAll();
            }).catch(err => showEmpty('読み込み失敗: ' + err.message));
        }

        function showEmpty(msg) {
            document.querySelector('.main').innerHTML = '<div class="empty">' + msg + '</div>';
        }

        // ========== 描画 ==========
        function renderAll() {
            document.getElementById('sessName').textContent = meta.name;

            const dur = Math.floor(meta.duration / 60000) + '分' + Math.floor((meta.duration % 60000) / 1000) + '秒';
            const date = new Date(meta.startTime).toLocaleString('ja-JP', { hour12: false });
            document.getElementById('metaBar').innerHTML = `
        <div class="meta-item"><span class="lbl">開始日時</span><span class="val">${date}</span></div>
        <div class="meta-item"><span class="lbl">記録時間</span><span class="val">${dur}</span></div>
        <div class="meta-item"><span class="lbl">データ点数</span><span class="val">${meta.pointCount} pt</span></div>
        <div class="meta-item"><span class="lbl">モード</span><span class="val">${meta.mode === 'auto' ? '自動' : '手動'}</span></div>
        ${meta.memo ? `<div class="meta-item"><span class="lbl">メモ</span><span class="val">${escapeHtml(meta.memo)}</span></div>` : ''}
      `;

            // 左サイドバー：チャンネル選択リスト
            const list = document.getElementById('channelList');
            list.innerHTML = '';
            FIELDS.forEach(f => {
                const vals = data.map(p => parseFloat(p[f.key])).filter(v => !isNaN(v));
                if (vals.length === 0) return;   // データが無い項目は非表示
                const div = document.createElement('div');
                div.className = 'ch-item';
                div.innerHTML = `
          <input type="checkbox" data-key="${f.key}" ${selected.has(f.key) ? 'checked' : ''}>
          <span class="ch-color" style="background:${f.color}"></span>
          <span class="ch-name">${f.label}</span>
          <span class="ch-unit">${f.unit}</span>
        `;
                div.querySelector('input').addEventListener('change', e => {
                    if (e.target.checked) selected.add(f.key);
                    else selected.delete(f.key);
                    drawChart();
                    renderStats();
                });
                // 行クリックでもトグル
                div.addEventListener('click', e => {
                    if (e.target.tagName !== 'INPUT') {
                        const chk = div.querySelector('input');
                        chk.checked = !chk.checked;
                        chk.dispatchEvent(new Event('change'));
                    }
                });
                list.appendChild(div);
            });

            drawChart();
            renderStats();
        }

        // 統計カード（選択中のみ）
        function renderStats() {
            const grid = document.getElementById('statsGrid');
            grid.innerHTML = '';
            FIELDS.filter(f => selected.has(f.key)).forEach(f => {
                const vals = data.map(p => parseFloat(p[f.key])).filter(v => !isNaN(v));
                if (vals.length === 0) return;
                const min = Math.min(...vals), max = Math.max(...vals);
                const avg = vals.reduce((a, b) => a + b, 0) / vals.length;
                const card = document.createElement('div');
                card.className = 'stat-card';
                card.innerHTML = `
          <div class="name"><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:${f.color};margin-right:5px;"></span>${f.label}${f.unit ? ' (' + f.unit + ')' : ''}</div>
          <div class="row"><span class="k">最小</span><span class="v">${fmt(min)}</span></div>
          <div class="row"><span class="k">最大</span><span class="v">${fmt(max)}</span></div>
          <div class="row"><span class="k">平均</span><span class="v">${fmt(avg)}</span></div>
        `;
                grid.appendChild(card);
            });
        }

        let chart = null;
        function drawChart() {
            const t0 = data[0].ts;
            const labels = data.map(p => ((p.ts - t0) / 1000).toFixed(0) + 's');
            const gridColor = getComputedStyle(document.documentElement).getPropertyValue('--grid').trim();
            const tickColor = getComputedStyle(document.documentElement).getPropertyValue('--tick').trim();

            const datasets = FIELDS.filter(f => selected.has(f.key)).map(f => ({
                label: f.label + (f.unit ? ' (' + f.unit + ')' : ''),
                data: data.map(p => parseFloat(p[f.key]) || 0),
                borderColor: f.color,
                backgroundColor: f.color + '22',
                borderWidth: 1.5, pointRadius: 0, tension: 0.3, fill: false
            }));

            if (chart) chart.destroy();
            chart = new Chart(document.getElementById('mainChart').getContext('2d'), {
                type: 'line',
                data: { labels, datasets },
                options: {
                    responsive: true, maintainAspectRatio: false, animation: { duration: 0 },
                    interaction: { mode: 'index', intersect: false },
                    scales: {
                        x: { grid: { color: gridColor }, ticks: { color: tickColor, maxTicksLimit: 14, font: { size: 10 } } },
                        y: { grid: { color: gridColor }, ticks: { color: tickColor, font: { size: 10 } } }
                    },
                    plugins: { legend: { labels: { color: tickColor, font: { size: 11 } } } }
                }
            });
        }

        function fmt(n) { return Math.abs(n) >= 100 ? n.toFixed(0) : n.toFixed(2); }
        function escapeHtml(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

        // ========== ダウンロード ==========
        function dlCSV() {
            if (!data) return;
            const keys = FIELDS.map(f => f.key);
            const headers = ['Timestamp', 'Time', ...FIELDS.map(f => f.label + (f.unit ? '(' + f.unit + ')' : ''))];
            const rows = data.map(p => {
                const t = new Date(p.ts).toLocaleTimeString('ja-JP', { hour12: false });
                return [p.ts, t, ...keys.map(k => p[k] !== undefined ? p[k] : '')];
            });
            const csv = '\uFEFF' + [
                headers.map(h => '"' + h + '"').join(','),
                ...rows.map(r => r.map(c => '"' + String(c).replace(/"/g, '""') + '"').join(','))
            ].join('\n');
            dl(csv, 'telemetry_' + meta.name.replace(/[\/\\:*?"<>|]/g, '_') + '.csv', 'text/csv;charset=utf-8;');
        }
        function dlJSON() {
            if (!data) return;
            dl(JSON.stringify({ session: meta, dataPoints: data }, null, 2),
                'telemetry_' + meta.name.replace(/[\/\\:*?"<>|]/g, '_') + '.json', 'application/json');
        }
        function dl(content, name, type) {
            const b = new Blob([content], { type });
            const u = URL.createObjectURL(b);
            const a = document.createElement('a');
            a.href = u; a.download = name; document.body.appendChild(a); a.click();
            document.body.removeChild(a); URL.revokeObjectURL(u);
        }
    </script>
</body>

</html>
